<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Flip</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111827;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

h1{
    margin-bottom:10px;
}

.score{
    font-size:2rem;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,110px);
    gap:18px;
    margin-bottom:30px;
}

.card{
    width:110px;
    height:150px;
    perspective:1000px;
    cursor:pointer;
}

.inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform .6s;
    transform-style:preserve-3d;
}

.flipped .inner{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    font-weight:bold;
    backface-visibility:hidden;
}

.front{
    background:#8a8a8a;
}

.back{
    transform:rotateY(180deg);
}

.plus{
    background:#16a34a;
}

.minus{
    background:#dc2626;
}

@keyframes rainbow{
    from{filter:hue-rotate(0deg);}
    to{filter:hue-rotate(360deg);}
}

.jackpot{
    animation: rainbow 2s linear infinite;
    color: white;
    text-shadow:
        0 0 8px white,
        0 0 20px gold,
        0 0 40px hotpink;
}

@keyframes goldPulse {
    0% {
        box-shadow: 0 0 8px #deb214;
        transform: rotateY(180deg) scale(1);
    }
    50% {
        box-shadow: 0 0 25px gold;
        transform: rotateY(180deg) scale(1.05);
    }
    100% {
        box-shadow: 0 0 8px #deb214;
        transform: rotateY(180deg) scale(1);
    }
}

.gold-card{
    animation: goldPulse 1.5s infinite;
    color: white;
    text-shadow:
        0 0 5px white,
        0 0 12px gold;
}

.controls{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

button{
    padding:12px 22px;
    font-size:1rem;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.bank{
    background:#16a34a;
    color:white;
}

.restart{
    background:#2563eb;
    color:white;
}

button:hover{
    opacity:.9;
}

.message{
    font-size:1.2rem;
    min-height:30px;
    text-align:center;
}
</style>
</head>

<body>

<h1>🃏 Card Flip</h1>

<div class="score">
Score: <span id="score">0</span>
</div>

<div class="controls">
<button class="bank" onclick="bank()">💰 Bank Score</button>
<button class="restart" onclick="newGame()">🔄 New Game</button>
<button onclick="newBoard()">🎴 New Board</button>
</div>

<div class="grid" id="grid"></div>

<div class="message" id="message">
Flip a card... or bank your points!
</div>

<script>

function animateScore(){

    scoreText.style.transform = "scale(1.3)";
    scoreText.style.color = "#ffd700";

    setTimeout(()=>{
        scoreText.textContent = score;
        scoreText.style.transform = "scale(1)";
        scoreText.style.color = "white";
    },100);

}

function newBoard(){

    if(gameOver) return;

    createCards();

    message.textContent="Fresh board! Your score carries over.";

}

function randomCard(){

    const roll = Math.random();

    // 0.25%
    if(roll < 0.0025) return "jackpot1";
    
    // 0.25%
    if(roll < 1) return "jackpot2";

    // 2%
    if(roll < 0.025) return "bomb";

    // 4%
    if(roll < 0.065) return "double";

    // 4%
    if(roll < 0.105) return "half";

    // 5%
    if(roll < 0.155) return 100;

    // Regular cards
    const regular=[
        5,5,5,5,
        10,10,10,
        20,20,
        50,
        -5,-5,-5,-5,
        -10,-10,
        -20,
        -50
    ];

    return regular[Math.floor(Math.random()*regular.length)];
}

function createDeck(){
    const deck=[];
    while(deck.length<16){
        deck.push(randomCard());
    }
    shuffle(deck);
    return deck;
}

let score = 0;
let gameOver = false;

const grid = document.getElementById("grid");
const scoreText = document.getElementById("score");
const message = document.getElementById("message");

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function getCardColor(value){

    switch(value){

        case 5: return "#98ff8c";
        case 10: return "#72fc62";
        case 20: return "#52fc3f";
        case 50: return "#1cfc03";
        case 100: return "#deb214";

        case "jackpot1":
            return "linear-gradient(135deg,#ff0080,#ff8c00,#ffee00,#00ff99,#00ccff,#7c3aed)";

        case "jackpot2":
            return "linear-gradient(135deg,#ff0080,#ff8c00,#ffee00,#00ff99,#00ccff,#7c3aed)";

        case -5: return "#f7b5b5";
        case -10: return "#fa8282";
        case -20: return "#f73939";
        case -50: return "#9e0606";

        case "double": return "#deb214";
        case "half": return "#fcca00";
        case "bomb": return "#290103";
    }

}

function createCards(){

    grid.innerHTML="";

    const values=createDeck();

    values.forEach(value=>{

        const card=document.createElement("div");
        card.className="card";

        const inner=document.createElement("div");
        inner.className="inner";

        const front=document.createElement("div");
        front.className="front";
        front.innerHTML="?";

        const back=document.createElement("div");
        back.className="back";
        if(value==="double"){
            back.innerHTML="x2";
            back.classList.add("gold-card");
        }
        else if(value==="half"){
            back.innerHTML="½";
        }
        else if(value==="bomb"){
            back.innerHTML="💣";
        }
        else if(value==="jackpot1"){
            back.innerHTML="+777";
            back.classList.add("gold-card");
        }
        else if(value==="jackpot2"){
            back.innerHTML="x7";
            back.classList.add("gold-card");
        }
        else{
            back.innerHTML=(value>0?"+":"")+value;
        }

        
        if(value==="double"){
            back.style.background="#11e6ed"; // blue
        }
        else if(value==="half"){
            back.style.background="#d9d325"; // gold
        }
        else if(value==="bomb"){
            back.style.background="#111";
            back.style.color="#290103";
        }
        else{
            const color = getCardColor(value);

        if (color.startsWith("linear-gradient")) {
            back.style.background = color;
            back.classList.add("jackpot");
        } else {
            back.style.background = color;
        }

        if(value === 100){
            back.classList.add("gold-card");
        }
        }

        inner.appendChild(front);
        inner.appendChild(back);

        card.appendChild(inner);

        card.onclick=()=>{

            if(gameOver) return;
            if(card.classList.contains("flipped")) return;

            card.classList.add("flipped");

            if(value==="double"){

            score*=2;

        }
        else if(value==="half"){

            score=Math.floor(score/2);

        }
        else if(value==="bomb"){

            score=0;
            gameOver=true;
            message.textContent="💣 BOOM! You lost everything!";

        }
            
        else if(value==="jackpot1"){
            score+=777;
        }
            
        else if(value==="jackpot2"){
            score*=7;
        }
            
        else{

            score+=value;

            if(score<0){
                score=0;
            }

        }

        animateScore();

        }

        grid.appendChild(card);

    });

}

function bank(){

    if(gameOver) return;

    gameOver=true;

    message.textContent="You banked "+score+" points!";

}

function newGame(){

    score=0;
    gameOver=false;
    scoreText.textContent=0;
    message.textContent="Flip a card... or bank your points!";

    createCards();

}

createCards();

</script>

</body>
</html>
