<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Flip</title>

<style>
/* The 'X' Button Link */
        .close-button {
            position: absolute;
            top: 15px;
            left: 15px; /* Changed from right to left */
            
            /* Sizing & Shape */
            width: 35px;
            height: 35px;
            background-color: #ff4d4d;
            border-radius: 50px;
            
            /* Flexbox to perfectly center the 'X' */
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Text/X Styling */
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            
            /* Smooth transitions for hover effects */
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Hover effect (darkens the red) */
        .close-button:hover {
            background-color: #ff1a1a;
        }

        /* Click effect (button presses down) */
        .close-button:active {
            transform: scale(0.9);
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.3);
        }

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #111827;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 15px;
}

#currencyBar {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    background: rgba(22,27,34,.95);
    border: 2px solid #4cc9ff;
    border-radius: 999px;
    box-shadow: 0 0 10px rgba(76,201,255,.4), inset 0 0 8px rgba(255,255,255,.05);
    font-size: 1.3rem;
    font-weight: bold;
    user-select: none;
    z-index: 9999;
}

.gemIcon {
    font-size: 1.5rem;
    animation: gemFloat 2s ease-in-out infinite;
    filter: drop-shadow(0 0 6px #4cc9ff);
}

#gemCount {
    min-width: 70px;
    text-align: right;
    color: #ffffff;
    text-shadow: 0 0 6px #4cc9ff;
    transition: transform .25s;
}

@keyframes gemFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
}

h1 { margin-bottom: 10px; }

.score {
    font-size: 2rem;
    margin-bottom: 20px;
}

#score {
    display: inline-block;
    transition: transform 0.2s ease, color 0.2s ease;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 30px;
}

.card {
    aspect-ratio: 11 / 15;
    perspective: 1000px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(-20px);
}

.inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform .6s;
    transform-style: preserve-3d;
}

.flipped .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.8rem;
    font-weight: bold;
    backface-visibility: hidden;
}

.front {
    background: #2a3447;
    border: 2px solid #3b82f6;
    color: #3b82f6;
}

.back {
    transform: rotateY(180deg);
}

@keyframes rainbow {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(360deg); }
}

.jackpot {
    animation: rainbow 2s linear infinite;
    color: white;
    text-shadow: 0 0 8px white, 0 0 20px gold, 0 0 40px hotpink;
}

@keyframes goldPulse {
    0%, 100% { box-shadow: 0 0 8px #deb214; transform: rotateY(180deg) scale(1); }
    50% { box-shadow: 0 0 25px gold; transform: rotateY(180deg) scale(1.05); }
}

.gold-card {
    animation: goldPulse 1.5s infinite;
    color: white;
    text-shadow: 0 0 5px white, 0 0 12px gold;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
}

button {
    padding: 12px 20px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
}

button:hover:not(:disabled) { opacity: 0.9; }
button:active:not(:disabled) { transform: scale(0.98); }
button:disabled { opacity: 0.4; cursor: not-allowed; }

.bank { background: #16a34a; color: white; }
.restart { background: #2563eb; color: white; }
.board-btn { background: #d97706; color: white; }

.message {
    font-size: 1.2rem;
    min-height: 30px;
    text-align: center;
}
</style>
</head>

<body>

<h1>🃏 Card Flip</h1>

<div>
    <a href="../../index.html" class="close-button">&times;</a>
</div>

<div id="currencyBar">
    <span class="gemIcon">💎</span>
    <span id="gemCount">0</span>
</div>

<div class="score">
    Score: <span id="score">0</span>
</div>

<div class="controls">
    <button id="bankBtn" class="bank" onclick="bank()">💰 Bank Score</button>
    <button class="restart" onclick="newGame()">New Game 💎150</button>
    <button id="boardBtn" class="board-btn" onclick="newBoard()">New Board 💎10</button>
</div>

<div class="grid" id="grid"></div>

<div class="message" id="message">
    Press "New Game" to start playing!
</div>

<script>
let score = 0;
let gameOver = true;
let boardLocked = false;
let cardsFlipped = 0;

const grid = document.getElementById("grid");
const scoreText = document.getElementById("score");
const message = document.getElementById("message");
const bankBtn = document.getElementById("bankBtn");
const boardBtn = document.getElementById("boardBtn");

function playSound(src) {
    const audio = new Audio(src);
    audio.play().catch(() => {});
}

function updateButtons() {
    bankBtn.disabled = gameOver || boardLocked;
    boardBtn.disabled = gameOver || boardLocked;
}

function animateScore() {
    scoreText.textContent = score;
    scoreText.style.transform = "scale(1.3)";
    scoreText.style.color = "#ffd700";

    setTimeout(() => {
        scoreText.style.transform = "scale(1)";
        scoreText.style.color = "white";
    }, 200);
}

function randomCard() {
    const roll = Math.random();

    if (roll < 0.0025) return "jackpot1"; // 0.25%
    if (roll < 0.005) return "jackpot2";  // 0.25%
    if (roll < 0.025) return "bomb";      // 2%
    if (roll < 0.065) return "double";    // 4%
    if (roll < 0.105) return "half";      // 4%
    if (roll < 0.155) return 100;         // 5%

    const regular = [
        5, 5, 5, 5,
        10, 10, 10,
        20, 20,
        50,
        -5, -5, -5, -5,
        -10, -10,
        -20,
        -50
    ];

    return regular[Math.floor(Math.random() * regular.length)];
}

function createDeck() {
    const deck = [];
    while (deck.length < 16) {
        deck.push(randomCard());
    }
    shuffle(deck);
    return deck;
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function getCardColor(value) {
    switch (value) {
        case 5: return "#98ff8c";
        case 10: return "#72fc62";
        case 20: return "#52fc3f";
        case 50: return "#1cfc03";
        case 100: return "#deb214";
        case "jackpot1":
        case "jackpot2":
            return "linear-gradient(135deg,#ff0080,#ff8c00,#ffee00,#00ff99,#00ccff,#7c3aed)";
        case -5: return "#f7b5b5";
        case -10: return "#fa8282";
        case -20: return "#f73939";
        case -50: return "#9e0606";
        case "double": return "#11e6ed";
        case "half": return "#d9d325";
        case "bomb": return "#111111";
        default: return "#ffffff";
    }
}

function createCards() {
    grid.innerHTML = "";
    playSound("oxidvideos-taking-playing-card-522520.mp3");
    cardsFlipped = 0;

    const values = createDeck();

    values.forEach((value, index) => {
        const card = document.createElement("div");
        card.className = "card";

        const inner = document.createElement("div");
        inner.className = "inner";

        const front = document.createElement("div");
        front.className = "front";
        front.innerHTML = "?";

        const back = document.createElement("div");
        back.className = "back";

        // Setup text content & extra classes
        if (value === "double") back.innerHTML = "x2";
        else if (value === "half") back.innerHTML = "½";
        else if (value === "bomb") back.innerHTML = "💣";
        else if (value === "jackpot1") { back.innerHTML = "+777"; back.classList.add("gold-card"); }
        else if (value === "jackpot2") { back.innerHTML = "x7"; back.classList.add("gold-card"); }
        else back.innerHTML = (value > 0 ? "+" : "") + value;

        // Background styling
        const color = getCardColor(value);
        if (color.startsWith("linear-gradient")) {
            back.style.background = color;
            back.classList.add("jackpot");
        } else {
            back.style.background = color;
            if (value === "bomb") back.style.color = "#ff3333";
            else back.style.color = "#000000";
        }

        if (value === 100 || value === "double") back.classList.add("gold-card");

        inner.appendChild(front);
        inner.appendChild(back);
        card.appendChild(inner);

        card.onclick = () => {
            if (gameOver || boardLocked || card.classList.contains("flipped") || cardsFlipped >= 5) return;

            card.classList.add("flipped");
            cardsFlipped++;
            playSound("oxidvideos-taking-playing-card-522520.mp3");

            if (value === "double") {
                score *= 2;
            } else if (value === "half") {
                score = Math.floor(score / 2);
            } else if (value === "bomb") {
                score = 0;
                gameOver = true;
                playSound("roblox-explosion-sound.mp3");
                revealRemainingCards();
                message.textContent = "💣 BOOM! You lost everything!";
                updateButtons();
            } else if (value === "jackpot1") {
                score += 777;
                playSound("slot-machine-jackpot-sound-effect.mp3");
            } else if (value === "jackpot2") {
                score *= 7;
                playSound("slot-machine-jackpot-sound-effect.mp3");
            } else {
                score += value;
                if (score < 0) score = 0;
            }

            animateScore();

            if (cardsFlipped >= 5 && !gameOver) {
                message.textContent = "🖐️ 5 cards flipped! Bank your score or get a new board.";
            }
        };

        grid.appendChild(card);

        // Staggered entry animation
        setTimeout(() => {
            card.style.transition = "opacity 0.25s, transform 0.25s";
            card.style.opacity = "1";
            card.style.transform = "translateY(0)";
        }, index * 40);
    });
}

function revealRemainingCards() {
    playSound("oxidvideos-taking-playing-card-522520.mp3");
    document.querySelectorAll(".card").forEach(card => card.classList.add("flipped"));
}

// Ensure game over is updated, so no more actions can occur after banking
function bank() {
    if (gameOver || boardLocked) return;

    revealRemainingCards();
    gameOver = true;
    updateButtons();

    if (typeof addGems === "function") {
        addGems(score);
    }

    message.textContent = "💰 You banked " + score + " points!";
}

function newBoard() {
    if (gameOver || boardLocked) return;

    if (typeof spendGems === "function" && !spendGems(10)) {
        message.textContent = "❌ Not enough gems (Need 💎10)!";
        return;
    }

    boardLocked = true;
    updateButtons();

    revealRemainingCards();
    message.textContent = "🎴 Dealing a new board...";

    setTimeout(() => {
        createCards();
        boardLocked = false;
        updateButtons();
        message.textContent = "Fresh board! Your score carries over.";
    }, 1200);
}

function newGame() {
    if (typeof spendGems === "function" && !spendGems(150)) {
        message.textContent = "❌ You need 150 💎 to play!";
        return;
    }

    score = 0;
    gameOver = false;
    scoreText.textContent = 0;
    message.textContent = "Flip a card... or bank your points!";
    
    updateButtons();
    createCards();
}

// Initial state initialization
updateButtons();
</script>

<script src="../../currency.js"></script>

</body>
</html>
