<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Card Flip</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{

    background:#111827;
    color:white;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;

}

.container{

    width:100%;
    max-width:950px;

}

h1{

    text-align:center;
    font-size:3rem;

}

.subtitle{

    text-align:center;
    color:#9ca3af;
    margin-top:8px;
    margin-bottom:30px;

}

.stats{

    display:flex;
    justify-content:space-between;
    align-items:center;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;

}

.panel{

    background:#1f2937;

    padding:18px 24px;

    border-radius:14px;

    min-width:170px;

    text-align:center;

    box-shadow:0 0 15px rgba(0,0,0,.25);

}

.panel h2{

    font-size:.95rem;
    color:#9ca3af;
    margin-bottom:6px;

}

.value{

    font-size:2rem;
    font-weight:bold;

}

#score{

    color:#22c55e;

    transition:.3s;

}

#highScore{

    color:#fbbf24;

}

.buttons{

    display:flex;

    justify-content:center;

    gap:15px;

    flex-wrap:wrap;

    margin-bottom:35px;

}

button{

    border:none;

    padding:14px 24px;

    border-radius:12px;

    color:white;

    cursor:pointer;

    font-size:1rem;

    transition:.25s;

}

button:hover{

    transform:translateY(-3px);

}

.bank{

    background:#16a34a;

}

.deal{

    background:#2563eb;

}

.reset{

    background:#dc2626;

}

.grid{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:18px;

}

.card{

    perspective:900px;

    height:150px;

    cursor:pointer;

}

.card.disabled{

    cursor:default;

}

.inner{

    width:100%;
    height:100%;

    position:relative;

    transition:.6s;

    transform-style:preserve-3d;

}

.card.flipped .inner{

    transform:rotateY(180deg);

}

.face{

    position:absolute;

    inset:0;

    border-radius:14px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:2rem;

    font-weight:bold;

    backface-visibility:hidden;

}

.front{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    border:2px solid rgba(255,255,255,.08);

}

.back{

    transform:rotateY(180deg);

}

/* Positive cards */

.plus5{
    background:#15803d;
}

.plus10{
    background:#16a34a;
}

.plus20{
    background:#22c55e;
}

.plus50{
    background:#4ade80;
    color:#111827;
}

.plus100{
    background:#a3e635;
    color:black;
    box-shadow:0 0 18px #84cc16;
}

/* Negative */

.minus5{
    background:#991b1b;
}

.minus10{
    background:#b91c1c;
}

.minus20{
    background:#dc2626;
}

.minus50{
    background:#ef4444;
}

/* Specials */

.double{

    background:#7c3aed;

}

.half{

    background:#f59e0b;
    color:black;

}

.bomb{

    background:black;

    color:#ef4444;

    box-shadow:0 0 20px red;

}

/* Jackpot */

@keyframes jackpot{

    0%{

        filter:hue-rotate(0deg);

        box-shadow:0 0 10px gold;

    }

    50%{

        transform:rotateY(180deg) scale(1.05);

        box-shadow:0 0 35px gold;

    }

    100%{

        filter:hue-rotate(30deg);

        box-shadow:0 0 15px gold;

    }

}

.jackpot{

    background:linear-gradient(
        45deg,
        gold,
        #fff4a3,
        gold
    );

    color:black;

    animation:jackpot 1.5s infinite;

}

.message{

    margin-top:30px;

    text-align:center;

    font-size:1.3rem;

    color:#d1d5db;

    min-height:35px;

}

@media(max-width:700px){

.grid{

grid-template-columns:repeat(2,1fr);

}

.card{

height:140px;

}

h1{

font-size:2.2rem;

}

}

</style>

</head>

<body>

<div class="container">

<h1>🃏 Card Flip</h1>

<div class="subtitle">

Flip cards... but know when to stop.

</div>

<div class="stats">

<div class="panel">

<h2>Current Score</h2>

<div id="score" class="value">0</div>

</div>

<div class="panel">

<h2>High Score</h2>

<div id="highScore" class="value">0</div>

</div>

</div>

<div class="buttons">

<button class="bank" onclick="bankScore()">
💰 Bank Score
</button>

<button class="deal" onclick="dealNewCards()">
🃏 Deal New Cards
</button>

<button class="reset" onclick="newGame()">
🔄 New Game
</button>

</div>

<div id="grid" class="grid"></div>

<div id="message" class="message">

Choose your first card...

</div>

</div>

<script>

/*

*/

</script>

</body>
</html>
