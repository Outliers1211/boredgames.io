<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Wheel</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1e1e2f;
      color: #fff;
    }

    h1 {
      margin-bottom: 20px;
    }

    .wheel-container {
      position: relative;
      width: 420px;
      height: 420px;
    }

    /* Top Marker/Pointer */
    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 30px solid #ff4757;
      z-index: 10;
    }

    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    button {
      margin-top: 30px;
      padding: 12px 36px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background: #2ed573;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
      transition: all 0.2s ease;
    }

    button:hover {
      background: #26af5f;
      transform: translateY(-2px);
    }

    button:disabled {
      background: #747d8c;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    #result {
      margin-top: 20px;
      font-size: 1.4rem;
      font-weight: bold;
      height: 30px;
      color: #ffa502;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Lucky Wheel</h1>

  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
  </div>

  <button id="spinBtn">SPIN</button>
  <div id="result"></div>

  <script>
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const resultDiv = document.getElementById('result');

    // Prize Configuration with Rarity-based Themes
    const prizes = [
      { label: '💎 +50', color: '#888888', rarity: 'Common' },
      { label: '💎 +75', color: '#777777', rarity: 'Common' },
      { label: '💎 +100', color: '#888888', rarity: 'Common' },
      { label: '💎 +150', color: '#777777', rarity: 'Common' },
      { label: '💎 +250', color: '#2ed573', rarity: 'Uncommon' },
      { label: '💎 +500', color: '#1e90ff', rarity: 'Rare' },
      { label: '⭐ +1000', color: '#a55eea', rarity: 'Epic' },
      { label: '💥 Lose 50', color: '#ff4757', rarity: 'Uncommon' },
      { label: '❌ Nothing', color: '#57606f', rarity: 'Common' },
      { label: '🎁 Free Spin', color: '#1e90ff', rarity: 'Rare' },
      { label: '💎 ×2 Gems', color: '#ff7f50', rarity: 'Very Rare' },
      { label: '👑 JACKPOT +5000', color: '#ffa502', rarity: 'Ultra Rare' }
    ];

    const numSegments = prizes.length;
    const arcSize = (2 * Math.PI) / numSegments;
    const radius = canvas.width / 2;

    let currentAngle = 0;
    let isSpinning = false;

    // Draw Wheel
    function drawWheel() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < numSegments; i++) {
        const angle = currentAngle + i * arcSize;
        
        // Draw Slice
        ctx.beginPath();
        ctx.fillStyle = prizes[i].color;
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, angle, angle + arcSize);
        ctx.lineTo(radius, radius);
        ctx.fill();

        // Slice Border
        ctx.strokeStyle = '#1e1e2f';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw Text
        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(angle + arcSize / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px sans-serif';
        ctx.fillText(prizes[i].label, radius - 15, 5);
        ctx.restore();
      }
    }

    function spin() {
      if (isSpinning) return;

      isSpinning = true;
      spinBtn.disabled = true;
      resultDiv.textContent = '';

      const extraSpins = 5 + Math.floor(Math.random() * 5);
      const randomStopAngle = Math.random() * 2 * Math.PI;
      const totalRotation = extraSpins * 2 * Math.PI + randomStopAngle;

      const duration = 4500; // 4.5 seconds
      const startTime = performance.now();
      const startAngle = currentAngle;

      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // Exponential ease-out for smooth stopping animation
        const easeOut = 1 - Math.pow(1 - progress, 4);
        currentAngle = startAngle + totalRotation * easeOut;

        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          isSpinning = false;
          spinBtn.disabled = false;
          determineWinner();
        }
      }

      requestAnimationFrame(animate);
    }

    function determineWinner() {
      const normalizedAngle = currentAngle % (2 * Math.PI);
      const pointerAngle = (3 * Math.PI) / 2; // Top position
      
      let winningIndex = Math.floor((2 * Math.PI + pointerAngle - normalizedAngle) % (2 * Math.PI) / arcSize);
      const prize = prizes[winningIndex];

      resultDiv.textContent = `🎉 You landed on: ${prize.label} (${prize.rarity})!`;
    }

    // Initial Render
    drawWheel();

    // Event Listener
    spinBtn.addEventListener('click', spin);
  </script>
</body>
</html>
