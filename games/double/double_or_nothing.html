<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double or Nothing - Risk Tower</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1e1e2f;
      color: #fff;
      overflow: hidden;
    }

    /* --- CURRENCY BAR --- */
    #currencyBar {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(22, 27, 34, 0.95);
      border: 2px solid #4cc9ff;
      border-radius: 999px;
      box-shadow: 0 0 10px rgba(76, 201, 255, 0.4), inset 0 0 8px rgba(255, 255, 255, 0.05);
      font-size: 1.3rem;
      font-weight: bold;
      user-select: none;
      z-index: 9999;
    }

    .gemIcon {
      font-size: 1.5rem;
      animation: gemFloat 2s ease-in-out infinite;
      filter: drop-shadow(0 0 6px #4cc9ff);
    }

    #gemCount {
      min-width: 70px;
      text-align: right;
      color: #ffffff;
      text-shadow: 0 0 6px #4cc9ff;
    }

    @keyframes gemFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    /* --- FX CANVAS --- */
    #fxCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 100;
    }

    /* --- GAME LAYOUT --- */
    .game-card {
      background: #27293d;
      border: 2px solid rgba(76, 201, 255, 0.2);
      border-radius: 20px;
      padding: 30px 40px;
      width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #4cc9ff;
      text-shadow: 0 0 10px rgba(76, 201, 255, 0.3);
    }

    /* Multiplier Display Box */
    .display-box {
      width: 100%;
      background: #1e1e2f;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .current-val {
      font-size: 2.8rem;
      font-weight: bold;
      color: #2ed573;
      text-shadow: 0 0 12px rgba(46, 213, 115, 0.4);
      transition: transform 0.2s ease;
    }

    .current-val.pop {
      transform: scale(1.15);
    }

    .chance-label {
      margin-top: 8px;
      font-size: 1rem;
      color: #a4b0be;
    }

    .chance-val {
      color: #ffa502;
      font-weight: bold;
    }

    /* Control Buttons */
    .btn-group {
      display: flex;
      gap: 15px;
      width: 100%;
    }

    button {
      flex: 1;
      padding: 14px 0;
      font-size: 1.1rem;
      font-weight: bold;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #doubleBtn {
      background: #2ed573;
      box-shadow: 0 5px 15px rgba(46, 213, 115, 0.3);
    }

    #doubleBtn:hover:not(:disabled) {
      background: #26af5f;
      transform: translateY(-2px);
    }

    #cashoutBtn {
      background: #ffa502;
      box-shadow: 0 5px 15px rgba(255, 165, 2, 0.3);
    }

    #cashoutBtn:hover:not(:disabled) {
      background: #eccc68;
      transform: translateY(-2px);
    }

    #startBtn {
      width: 100%;
      background: #1e90ff;
      box-shadow: 0 5px 15px rgba(30, 144, 255, 0.3);
    }

    #startBtn:hover:not(:disabled) {
      background: #0071e3;
      transform: translateY(-2px);
    }

    button:disabled {
      background: #57606f !important;
      cursor: not-allowed;
      box-shadow: none !important;
      transform: none !important;
      opacity: 0.6;
    }

    #statusMsg {
      margin-top: 18px;
      font-size: 1.2rem;
      font-weight: bold;
      height: 28px;
      text-align: center;
    }

    .win-text { color: #2ed573; }
    .lose-text { color: #ff4757; }
  </style>
</head>
<body>

  <div id="currencyBar">
    <span class="gemIcon">💎</span>
    <span id="gemCount">0</span>
  </div>

  <canvas id="fxCanvas"></canvas>

  <div class="game-card">
    <h1>Double or Nothing</h1>

    <div class="display-box">
      <div id="potDisplay" class="current-val">💎 1</div>
      <div class="chance-label">
        Next Double Chance: <span id="chanceDisplay" class="chance-val">95%</span>
      </div>
    </div>

    <!-- Start State -->
    <button id="startBtn">START RUN (50💎)</button>

    <!-- Playing State (Hidden initially) -->
    <div id="playControls" class="btn-group" style="display: none;">
      <button id="doubleBtn">DOUBLE!</button>
      <button id="cashoutBtn">CASH OUT</button>
    </div>

    <div id="statusMsg"></div>
  </div>

  <script>
    // Elements
    const potDisplay = document.getElementById('potDisplay');
    const chanceDisplay = document.getElementById('chanceDisplay');
    const startBtn = document.getElementById('startBtn');
    const doubleBtn = document.getElementById('doubleBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const playControls = document.getElementById('playControls');
    const statusMsg = document.getElementById('statusMsg');

    // Particle FX Setup
    const fxCanvas = document.getElementById('fxCanvas');
    const fxCtx = fxCanvas.getContext('2d');
    function resizeFx() {
      fxCanvas.width = window.innerWidth;
      fxCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeFx);
    resizeFx();

    let particles = [];

    // Game Variables
    let currentPot = 1;
    let currentStage = 1;
    let isPlaying = false;

    // Success rate decreases by 5% each stage (Stage 1: 95%, Stage 2: 90%, etc., down to 5% min)
    function getSuccessChance(stage) {
      const chance = 100 - (stage * 5);
      return Math.max(chance, 5);
    }

    function updateUI() {
      potDisplay.textContent = `💎 ${currentPot}`;
      const nextChance = getSuccessChance(currentStage);
      chanceDisplay.textContent = `${nextChance}%`;
    }

    // --- AUDIO SYNTHESIS EFFECTS ---
    function playBeep(freq, duration) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

      osc.connect(gain);
      gain.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    function playLossSound() {
      playBeep(180, 0.4);
    }

    function playWinSound() {
      playBeep(523.25, 0.2); // C5 tone
    }

    // --- PARTICLE BURST ---
    function triggerConfetti() {
      const colors = ['#2ed573', '#4cc9ff', '#ffa502', '#ffffff'];
      for (let i = 0; i < 80; i++) {
        particles.push({
          x: window.innerWidth / 2,
          y: window.innerHeight / 2,
          vx: (Math.random() - 0.5) * 14,
          vy: (Math.random() - 0.7) * 14,
          size: Math.random() * 8 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          alpha: 1,
          gravity: 0.2,
          drag: 0.96
        });
      }
    }

    function updateParticles() {
      fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.vx *= p.drag;
        p.vy *= p.drag;
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.01;

        fxCtx.save();
        fxCtx.globalAlpha = Math.max(p.alpha, 0);
        fxCtx.fillStyle = p.color;
        fxCtx.fillRect(p.x, p.y, p.size, p.size);
        fxCtx.restore();

        if (p.alpha <= 0) particles.splice(i, 1);
      }
      requestAnimationFrame(updateParticles);
    }
    updateParticles();

    // --- GAME ACTIONS ---
    function startRun() {
      // Attempt to spend 50 gems
      if (typeof spendGems === 'function') {
        if (!spendGems(50)) {
          statusMsg.className = 'lose-text';
          statusMsg.textContent = "❌ Need 50💎 to play!";
          return;
        }
      }

      isPlaying = true;
      currentPot = 1;
      currentStage = 1;
      statusMsg.textContent = '';

      startBtn.style.display = 'none';
      playControls.style.display = 'flex';
      
      updateUI();
    }

    function doubleOrNothing() {
      if (!isPlaying) return;

      const chance = getSuccessChance(currentStage);
      const roll = Math.random() * 100;

      if (roll < chance) {
        // Success
        currentPot *= 2;
        currentStage++;
        playWinSound();

        // Visual Pop
        potDisplay.classList.add('pop');
        setTimeout(() => potDisplay.classList.remove('pop'), 200);

        statusMsg.className = 'win-text';
        statusMsg.textContent = "✨ Doubled!";
        updateUI();
      } else {
        // Busted!
        playLossSound();
        statusMsg.className = 'lose-text';
        statusMsg.textContent = `💥 Busted at Stage ${currentStage}! Lost 💎${currentPot}`;
        resetGame();
      }
    }

    function cashOut() {
      if (!isPlaying) return;

      if (typeof addGems === 'function') {
        addGems(currentPot);
      }

      triggerConfetti();
      playWinSound();

      statusMsg.className = 'win-text';
      statusMsg.textContent = `🎉 Cashed out 💎${currentPot}!`;
      resetGame();
    }

    function resetGame() {
      isPlaying = false;
      currentPot = 1;
      currentStage = 1;

      startBtn.style.display = 'block';
      playControls.style.display = 'none';
      updateUI();
    }

    // Listeners
    startBtn.addEventListener('click', startRun);
    doubleBtn.addEventListener('click', doubleOrNothing);
    cashoutBtn.addEventListener('click', cashOut);
  </script>

  <script src="../../currency.js"></script>
</body>
</html>
